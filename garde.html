  <script>
    function activerLien(el) {
      document.querySelectorAll('.menu-item').forEach(li => li.classList.remove('active'));
      el.closest('.menu-item').classList.add('active');
      if (window.innerWidth < 800) fermerSidebar();
    }
    function toggleSidebar() {
      const s = document.getElementById('sidebar');
      const o = document.getElementById('overlay');
      const ouvert = s.classList.toggle('open');
      o.classList.toggle('show', ouvert);
    }
    function fermerSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }
  </script>
